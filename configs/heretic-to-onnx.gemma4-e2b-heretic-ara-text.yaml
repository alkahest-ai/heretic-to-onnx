source_model_id: p-e-w/gemma-4-E2B-it-heretic-ara
base_model_id: google/gemma-4-E2B-it
architecture: gemma4_conditional_generation
target_repo_id: alkahest-ai/rally-2b-text
target_dtype: q4f16
target_device: webgpu
modalities:
  - text
inherit_assets:
  from_source:
    - config.json
    - generation_config.json
    - tokenizer.json
    - tokenizer_config.json
    - chat_template.jinja
  from_base_if_missing:
    - processor_config.json
expected_architecture: Gemma4ForConditionalGeneration
expected_onnx_files:
  - onnx/embed_tokens_q4f16.onnx
  - onnx/embed_tokens_q4f16.onnx_data
  - onnx/decoder_model_merged_q4f16.onnx
  - onnx/decoder_model_merged_q4f16.onnx_data
validation:
  smoke_prompt: Write one short paragraph in character as Heretic.
  browser_loader_class: Gemma4ForCausalLM
  processor_class: AutoProcessor
