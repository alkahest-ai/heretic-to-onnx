source_model_id: coder3101/gemma-4-E4B-it-heretic
base_model_id: google/gemma-4-E4B-it
architecture: gemma4_conditional_generation
target_repo_id: alkahest-ai/rally-4b-v2
target_dtype: q4f16
target_device: webgpu
modalities:
  - text
  - image
  - audio
  - video
inherit_assets:
  from_source:
    - config.json
    - generation_config.json
    - tokenizer.json
    - tokenizer_config.json
    - chat_template.jinja
  from_base_if_missing:
    - processor_config.json
    - preprocessor_config.json
    - video_preprocessor_config.json
expected_architecture: Gemma4ForConditionalGeneration
expected_onnx_files:
  - onnx/vision_encoder_q4f16.onnx
  - onnx/vision_encoder_q4f16.onnx_data
  - onnx/audio_encoder_q4f16.onnx
  - onnx/audio_encoder_q4f16.onnx_data
  - onnx/embed_tokens_q4f16.onnx
  - onnx/embed_tokens_q4f16.onnx_data
  - onnx/decoder_model_merged_q4f16.onnx
  - onnx/decoder_model_merged_q4f16.onnx_data
validation:
  smoke_prompt: Describe the attached image, audio, or video in character as Heretic.
  browser_loader_class: Gemma4ForConditionalGeneration
  processor_class: AutoProcessor
